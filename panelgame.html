<style>
  body {
    font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;

    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    text-align: center;
    margin: 20px 0;
    color: #333;
  }

  #timer {
    font-size: 20px;
    margin-bottom: 20px;
    color: #444;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    grid-template-rows: repeat(5, 80px);
    gap: 5px;
    justify-content: center;
    align-items: center;
  }

  .tile {
    width: 80px;
    height: 80px;
    background: #fff;
    border: 2px solid #555;
    box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    transition: transform 0.2s;
  }

  .tile:active {
    transform: scale(0.95);
  }

  #message {
    margin-top: 20px;
    font-size: 18px;
    color: #333;
  }

#result {
  display: none;              
  margin: 20px auto;
  padding: 15px;
  max-width: 500px;
  background: #fff;
  border: 2px solid #ccc;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.1);
}

#result .title {
  font-size: 20px;
  font-weight: bold;
  text-align: center;     /* クリア！経過時間は中央寄せ */

let board = document.getElementById("board");
let message = document.getElementById("message");
let result = document.getElementById("result");
let timerEl = document.getElementById("timer");
let tiles = [];
let startTime;
let timerInterval;

let selectedIdioms = [];
let selectedTiles = [];
let firstTile = null;

function init() {
  // 5つの熟語をランダム選択
  selectedIdioms = [];
  while (selectedIdioms.length < 5) {
    let idiom = idioms[Math.floor(Math.random()*idioms.length)];
    if (!selectedIdioms.includes(idiom)) selectedIdioms.push(idiom);
  }

  // 熟語の文字を並べる
  tiles = selectedIdioms.map(i => i.word.split("")).flat();

  // シャッフル
  for (let i = tiles.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
  }

  // 盤描画
  board.innerHTML = "";
  tiles.forEach((ch, idx) => {
    let div = document.createElement("div");
    div.className = "tile";
    div.textContent = ch;
    div.dataset.index = idx;
    div.addEventListener("click", () => selectTile(div));
    board.appendChild(div);
  });

  // タイマー開始
  clearInterval(timerInterval);
  startTime = Date.now();
  timerInterval = setInterval(updateTimer, 500);
}

function updateTimer() {
  let elapsed = Math.floor((Date.now() - startTime) / 1000);
  timerEl.textContent = "経過時間: " + elapsed + "秒";
}

function selectTile(tile) {
  if (!firstTile) {
    firstTile = tile;
    tile.style.background = "#ccf";
  } else if (firstTile === tile) {
    firstTile.style.background = "#fff";
    firstTile = null;
  } else {
    swapTiles(firstTile, tile);
    firstTile.style.background = "#fff";
    firstTile = null;
    checkWin();
  }
}

function swapTiles(tile1, tile2) {
  let tmp = tile1.textContent;
  tile1.textContent = tile2.textContent;
  tile2.textContent = tmp;
}

function checkWin() {
  let rows = [];
  for (let i = 0; i < 5; i++) {
    rows.push(tilesRow(i));
  }
  let remaining = selectedIdioms.map(i => i.word);
  for (let row of rows) {
    let idx = remaining.indexOf(row);
    if (idx !== -1) {
      remaining.splice(idx, 1);
    }
  }
if (remaining.length === 0) {
  clearInterval(timerInterval);
  let clearTime = Math.floor((Date.now() - startTime) / 1000);

  // 各熟語をルビ付きでブロック化
  let rubyText = selectedIdioms.map(i => 
    `<div class="idiom-block">
       <div class="idiom-word"><ruby>${i.word}<rt>${i.reading}</rt></ruby></div>
       <div class="idiom-meaning">${i.meaning}</div>
     </div>`
  ).join("");

  result.innerHTML = `
    <div class="title">✨クリア！✨<br>経過時間: ${clearTime}秒</div>
    ${rubyText}
    <center><button id="goRanking" style="margin-top:15px; padding:5px 12px; font-size:14px; cursor:pointer;">
      ランキングに登録
    </button></center>
  `;
  result.style.display = "block";   

  // ボタンクリックでランキングページへ
  document.getElementById("goRanking").onclick = function() {
    const yojiParam = encodeURIComponent(JSON.stringify(selectedIdioms.map(i => i.word)));
    
    // スプレッドシート用のユニークIDを生成
    const myEntryId = encodeURIComponent("panel_" + clearTime + "_" + new Date().getTime());
    
    // ランキングページへ移動
    location.href = `panel-ranking.html?time=${clearTime}&yoji=${yojiParam}&entryId=${myEntryId}`;
  };
}
}

function tilesRow(row) {
  let text = "";
  for (let col = 0; col < 4; col++) {
    text += board.children[row * 4 + col].textContent;
  }
  return text;
}

init();
</script>
</body>
</html>
